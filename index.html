<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ladder Sim — Simulador de Lógica Ladder</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <header>
    <h1>⚡ Ladder Sim</h1>
    <span class="subtitle">Simulador de Lógica Ladder</span>
    <div class="header-actions">
      <select id="select-example">
        <option value="">— Exemplos prontos —</option>
        <option value="partida-direta">Partida Direta de Motor</option>
        <option value="estrela-triangulo">Partida Estrela-Triângulo</option>
        <option value="semaforo">Semáforo</option>
        <option value="contagem-pecas">Contagem de Peças</option>
      </select>
      <button id="btn-export" title="Exportar programa JSON">⬇ Export</button>
      <button id="btn-import" title="Importar programa JSON">⬆ Import</button>
      <input type="file" id="input-import" accept=".json" style="display:none">
    </div>
  </header>

  <section class="controls">
    <button id="btn-start">▶ Start</button>
    <button id="btn-stop" disabled>⏹ Stop</button>
    <button id="btn-step">⏭ Step</button>
    <label>
      Scan:
      <input type="range" id="scan-speed" min="50" max="1000" value="100" step="50">
      <span id="scan-speed-label">100ms</span>
    </label>
    <span id="program-comment" class="program-comment"></span>
  </section>

  <section class="toolbar">
    <span class="toolbar-label">Inserir:</span>

    <button class="tool-btn" data-type="NO" title="Contato NA — Normalmente Aberto">
      <svg width="48" height="28" viewBox="0 0 80 60">
        <line x1="0"  y1="30" x2="20" y2="30" class="wire"/>
        <line x1="20" y1="10" x2="20" y2="50" class="contact"/>
        <line x1="60" y1="10" x2="60" y2="50" class="contact"/>
        <line x1="60" y1="30" x2="80" y2="30" class="wire"/>
      </svg>
      <span class="tool-label">NA</span>
    </button>

    <button class="tool-btn" data-type="NC" title="Contato NF — Normalmente Fechado">
      <svg width="48" height="28" viewBox="0 0 80 60">
        <line x1="0"  y1="30" x2="20" y2="30" class="wire"/>
        <line x1="20" y1="10" x2="20" y2="50" class="contact"/>
        <line x1="60" y1="10" x2="60" y2="50" class="contact"/>
        <line x1="20" y1="50" x2="60" y2="10" class="contact"/>
        <line x1="60" y1="30" x2="80" y2="30" class="wire"/>
      </svg>
      <span class="tool-label">NF</span>
    </button>

    <button class="tool-btn" data-type="COIL" title="Bobina">
      <svg width="48" height="28" viewBox="0 0 80 60">
        <line x1="0"  y1="30" x2="24" y2="30" class="wire"/>
        <circle cx="40" cy="30" r="16" class="coil"/>
        <line x1="56" y1="30" x2="80" y2="30" class="wire"/>
      </svg>
      <span class="tool-label">Bobina</span>
    </button>

    <button class="tool-btn" data-type="COIL_NEG" title="Bobina Negada">
      <svg width="48" height="28" viewBox="0 0 80 60">
        <line x1="0"  y1="30" x2="24" y2="30" class="wire"/>
        <circle cx="40" cy="30" r="16" class="coil"/>
        <line x1="32" y1="40" x2="48" y2="20" class="contact"/>
        <line x1="56" y1="30" x2="80" y2="30" class="wire"/>
      </svg>
      <span class="tool-label">Bob/</span>
    </button>

    <button class="tool-btn" data-type="SET" title="Bobina SET">
      <svg width="48" height="28" viewBox="0 0 80 60">
        <line x1="0"  y1="30" x2="24" y2="30" class="wire"/>
        <circle cx="40" cy="30" r="16" class="coil"/>
        <text x="40" y="35" class="coil-label">S</text>
        <line x1="56" y1="30" x2="80" y2="30" class="wire"/>
      </svg>
      <span class="tool-label">SET</span>
    </button>

    <button class="tool-btn" data-type="RESET" title="Bobina RESET">
      <svg width="48" height="28" viewBox="0 0 80 60">
        <line x1="0"  y1="30" x2="24" y2="30" class="wire"/>
        <circle cx="40" cy="30" r="16" class="coil"/>
        <text x="40" y="35" class="coil-label">R</text>
        <line x1="56" y1="30" x2="80" y2="30" class="wire"/>
      </svg>
      <span class="tool-label">RESET</span>
    </button>

    <button class="tool-btn" data-type="TON" title="Timer ON-delay">
      <svg width="48" height="28" viewBox="0 0 80 60">
        <rect x="16" y="10" width="48" height="40" class="coil"/>
        <text x="40" y="35" class="coil-label">TON</text>
      </svg>
      <span class="tool-label">TON</span>
    </button>

    <button class="tool-btn" data-type="CTU" title="Contador Up">
      <svg width="48" height="28" viewBox="0 0 80 60">
        <rect x="16" y="10" width="48" height="40" class="coil"/>
        <text x="40" y="35" class="coil-label">CTU</text>
      </svg>
      <span class="tool-label">CTU</span>
    </button>

    <div class="toolbar-sep"></div>

    <button class="tool-btn" id="btn-add-rung">
      <span style="font-size:1.2rem">＋</span>
      <span class="tool-label">Rung</span>
    </button>

    <button class="tool-btn danger" id="btn-clear">
      <span style="font-size:1.2rem">🗑</span>
      <span class="tool-label">Limpar</span>
    </button>

  </section>

  <div id="editor-hint" class="editor-hint">
    Selecione um elemento acima e clique no rung para inserir. Duplo clique para renomear. Botão direito para deletar.
  </div>

  <div class="workspace">
    <section class="ladder-canvas">
      <svg id="ladder-svg" width="100%"></svg>
    </section>
    <aside class="io-panel">
      <div id="panel-inputs"></div>
      <div id="panel-outputs"></div>
      <div id="panel-memory"></div>
    </aside>
  </div>

  <footer>
    <p>Projeto de portfólio — <a href="https://github.com/rafaelf09" target="_blank">rafaelf09</a></p>
  </footer>

  <script src="js/engine.js"></script>
  <script src="js/elements.js"></script>
  <script src="js/editor.js"></script>
  <script src="js/examples.js"></script>
  <script src="js/ui.js"></script>
  <script>
    window.addEventListener('DOMContentLoaded', () => {
      window.LadderEditor.init('ladder-svg');
      window.UI.init();
    });
  </script>

</body>
</html>
